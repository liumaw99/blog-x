name: Deploy to Aliyun OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build
        run: hugo --gc --minify

      - name: Install ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil64

      - name: Clear old files
        run: |
          ./ossutil64 -e ${{ secrets.OSS_ENDPOINT }} \
                      -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
                      -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
                      rm -r -f oss://${{ secrets.OSS_BUCKET }}/

      - name: Deploy to OSS
        run: |
          ./ossutil64 -e ${{ secrets.OSS_ENDPOINT }} \
                      -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
                      -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
                      cp -r -f public/ oss://${{ secrets.OSS_BUCKET }}/
