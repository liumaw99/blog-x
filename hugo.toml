# =====================================================================================
# Hugo FixIt 博客配置
# =====================================================================================

# 站点基础信息
title = "Vibely"
baseURL = "https://vibely.uno"
defaultContentLanguage = "zh-cn"
languageCode = "zh-CN"
languageName = "简体中文"
hasCJKLanguage = true
copyright = ""
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true
mainSections = ["tech", "life", "notes"]

# 主题
theme = ["FixIt", "component-projects", "cmpt-post-preview"]

# Front Matter
[frontmatter]
_merge = "shallow"
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

# 图片处理
[imaging]
_merge = "shallow"
quality = 75

# 菜单配置
[menus]

[[menus.main]]
identifier = "home"
name = "首页"
url = "/"
weight = -1
[menus.main.params]
icon = "fa-regular fa-house"

[[menus.main]]
identifier = "tech"
parent = "articles"
name = "技术"
url = "/tech/"
weight = 1
[menus.main.params]
icon = "fa-regular fa-lightbulb"

[[menus.main]]
identifier = "life"
parent = "articles"
name = "生活"
url = "/life/"
weight = 2
[menus.main.params]
icon = "fa-regular fa-compass"

[[menus.main]]
identifier = "notes"
parent = "articles"
name = "笔记"
url = "/notes/"
weight = 3
[menus.main.params]
icon = "fa-regular fa-pen-to-square"

[[menus.main]]
identifier = "articles"
name = "文章"
url = "/archives/"
weight = 1
[menus.main.params]
icon = "fa-solid fa-feather"

[[menus.main]]
identifier = "categories"
parent = "articles"
name = "分类"
url = "/categories/"
weight = 4
[menus.main.params]
icon = "fa-regular fa-folder"

[[menus.main]]
identifier = "tags"
parent = "articles"
name = "标签"
url = "/tags/"
weight = 5
[menus.main.params]
icon = "fa-regular fa-bookmark"

[[menus.main]]
identifier = "archives"
parent = "articles"
name = "归档"
url = "/archives/"
weight = 6
[menus.main.params]
icon = "fa-regular fa-folder-open"

[[menus.main]]
identifier = "collections"
parent = "articles"
name = "合集"
url = "/collections/"
weight = 7
[menus.main.params]
icon = "fa-solid fa-layer-group"

[[menus.main]]
identifier = "fixit"
parent = "articles"
pre = '<img class="fixit-icon" src="https://fixit.lruihao.cn/images/hugo-fixit.webp" alt="FixIt logo">'
post = '<i class="fa-solid fa-arrow-up-right-from-square fa-xs text-secondary"></i>'
name = "FixIt"
url = "https://fixit.lruihao.cn/"
title = "FixIt 官网"
weight = 8
[menus.main.params]
divided = true

[[menus.main]]
identifier = "about"
parent = "more"
name = "关于"
url = "/about/"
weight = 1
[menus.main.params]
icon = "fa-regular fa-circle-user"

[[menus.main]]
identifier = "projects"
parent = "more"
name = "开源"
url = "/projects/"
weight = 2
[menus.main.params]
icon = "fa-solid fa-diagram-project"

[[menus.main]]
identifier = "friends"
parent = "more"
name = "友链"
url = "/friends/"
weight = 3
[menus.main.params]
icon = "fa-regular fa-handshake"

[[menus.main]]
identifier = "guestbook"
parent = "more"
name = "留言"
url = "/guestbook/"
weight = 4
[menus.main.params]
icon = "fa-regular fa-comments"

[[menus.main]]
identifier = "rss"
parent = "more"
name = "RSS"
url = "/index.xml"
weight = 5
[menus.main.params]
icon = "fa-solid fa-rss"

[[menus.main]]
identifier = "more"
name = "更多"
url = ""
weight = 2
[menus.main.params]
icon = "fa-solid fa-ellipsis"

# 关联内容
[related]
_merge = "shallow"

# 模块
[module]
[module.hugoVersion]
extended = true
min = "0.156.0"

# 标记语言配置
[markup]
_merge = "shallow"

[markup.highlight]
codeFences = true
noClasses = false
anchorLineNos = false
guessSyntax = true
lineNos = true
lineNumbersInTable = true

[markup.goldmark]
duplicateResourceFiles = false

[markup.goldmark.extensions]
definitionList = true
footnote = true
linkify = true
linkifyProtocol = 'https'
strikethrough = false
table = true
taskList = true
typographer = true

[markup.goldmark.extensions.extras]
[markup.goldmark.extensions.extras.delete]
enable = true
[markup.goldmark.extensions.extras.insert]
enable = true
[markup.goldmark.extensions.extras.mark]
enable = true
[markup.goldmark.extensions.extras.subscript]
enable = true
[markup.goldmark.extensions.extras.superscript]
enable = true

# MathJax / KaTeX 支持
[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)'], ['$', '$']]

[markup.goldmark.parser]
[markup.goldmark.parser.attribute]
block = true
title = true

[markup.goldmark.renderer]
hardWraps = false
unsafe = true
xhtml = false

# 网站地图
[sitemap]
changefreq = "weekly"
disable = false
filename = "sitemap.xml"
priority = 0.5

# 永久链接
[permalinks]
[permalinks.page]
tech = "/:section/:slugorcontentbasename"
life = "/:section/:slugorcontentbasename"
notes = "/:section/:slugorcontentbasename"
[permalinks.section]
tech = "/tech"
life = "/life"
notes = "/notes"

# 隐私配置
[privacy]
[privacy.x]
enableDNT = true
[privacy.youtube]
privacyEnhanced = true

# 输出格式
[outputs]
_merge = "shallow"
home = ["html", "rss", "archives", "offline", "search"]
page = ["html", "markdown"]
section = ["html", "rss"]
taxonomy = ["html"]
term = ["html", "rss"]

# 分类法
[taxonomies]
_merge = "shallow"
category = "categories"
tag = "tags"
collection = "collections"

# =====================================================================================
# FixIt 主题核心配置
# =====================================================================================

[params]
version = "0.4.X"
description = "Vibely 的数字花园，记录技术实践、学习笔记与生活观察。"
keywords = ["Vibely", "Hugo", "FixIt", "技术博客", "学习笔记", "生活随笔"]
defaultTheme = "auto"
fingerprint = "sha256"
dateFormat = "2006-01-02"
images = ["/images/og-image.svg"]
enablePWA = true
capitalizeTitles = false
externalIcon = true
withSiteTitle = true
titleDelimiter = "-"
indexWithSubtitle = true
summaryPlainify = false
enableTranslationMerge = false
tooltip = true
disableThemeInject = false

# 作者信息
[params.author]
name = "Vibely"
email = "hello@vibely.uno"
link = "https://github.com/liumaw99"
avatar = "/images/avatar/cbbd7e3bdf278af4275d0ff155e88ca6.png"

# Git 信息
[params.gitInfo]
repo = "https://github.com/liumaw99/blog-x"
branch = "main"
dir = "content"
issueTpl = "title=[BUG]%20{title}&body=|Field|Value|%0A|-|-|%0A|Title|{title}|%0A|URL|{URL}|%0A|Filename|{sourceURL}|"

# 应用图标
[params.app]
title = "Vibely"
noFavicon = false
svgFavicon = "/favicon.svg"
iconColor = "#5bbad5"
tileColor = "#da532c"
[params.app.themeColor]
light = "#f8f8f8"
dark = "#252627"

# 搜索配置（启用 Fuse.js）
[params.search]
enable = true
type = "fuse"
contentLength = 4000
placeholder = "搜索文章、笔记与关键词..."
maxResultLength = 10
snippetLength = 50
highlightTag = "em"
absoluteURL = false
anchorify = true

[params.search.fuse]
isCaseSensitive = false
minMatchCharLength = 2
findAllMatches = false
location = 0
threshold = 0.3
distance = 100
ignoreLocation = false
useExtendedSearch = false
ignoreFieldNorm = false

# 头部导航
[params.header]
desktopMode = "sticky"
mobileMode = "auto"

[params.header.title]
logo = ""
name = "Vibely"
pre = ""
post = ""
typeit = false

[params.header.subtitle]
name = "技术、笔记与生活的共振"
typeit = false

# 面包屑导航
[params.breadcrumb]
enable = true
sticky = false
showHome = true
separator = "/"
capitalize = false

# 文章导航
[params.navigation]
inSection = true
reverse = false

# 页脚
[params.footer]
enable = true
copyright = true
author = true
since = "2024"
gov = ""
icp = ""
license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>'

[params.footer.powered]
enable = false
hugoLogo = false
themeLogo = false

[params.footer.siteTime]
enable = true
animate = true
icon = "fa-regular fa-heart"
pre = "本站已运行"
value = "2024-01-01T00:00:00+08:00"

[params.footer.order]
powered = 0
copyright = 1
statistics = 2
visitor = 3
beian = 4

# 归档
[params.archives]
paginate = 20
dateFormat = "01-02"

# 列表页
[params.section]
paginate = 12
dateFormat = "01-02"
[params.section.feed]
limit = -1
fullText = false

[params.list]
paginate = 12
dateFormat = "01-02"
[params.list.feed]
limit = -1
fullText = false

# 最近更新
[params.recentlyUpdated]
archives = true
section = true
list = true
days = 30
maxCount = 10

# 标签云
[params.tagcloud]
enable = true
min = 14
max = 32
peakCount = 10
orderby = "name"

# 首页
[params.home]
[params.home.profile]
enable = true
onlyFirstPage = true
gravatarEmail = ""
avatarURL = "/images/avatar/cbbd7e3bdf278af4275d0ff155e88ca6.png"
avatarMenu = ""
title = "Vibely"
subtitle = "把技术实践、成长笔记与生活观察，写成一座可长期维护的博客。"
typeit = true
social = true
disclaimer = ""

[params.home.posts]
enable = true
paginate = 8

# 社交链接
[params.social]
GitHub = "liumaw99"
Zhihu = ""
Bilibili = ""
QQ = "969236713"
Email = "liumaw99@foxmail.com"
RSS = true

# TypeIt
[params.typeit]
speed = 100
cursorSpeed = 1000
cursorChar = "|"
duration = -1
loop = true

[params.postPreview]
enable = true
debug = false
mobileBp = 900
disableOnHome = false
excludeSelector = ""
